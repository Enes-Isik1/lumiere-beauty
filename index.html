<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Automatische Weiterleitung nach 5 Sekunden, damit die edle Linie Zeit hat auszulaufen -->
  <meta http-equiv="refresh" content="5; url=kosmetik-studio.html">
  <title>Lumière Beauty Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --nude: #F9F0EB;
      --dark: #1A0F0F;
      --rose: #C97070;
      --warm-gray: #8A7070;
      --white: #FEFAF8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--white);
      color: var(--dark);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .intro-container {
      max-width: 500px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Das "atmende" Logo */
    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--dark);
      text-decoration: none;
      animation: logoPulse 2.5s infinite ease-in-out;
    }
    .brand-logo span {
      font-style: italic;
      color: var(--rose);
    }

    .welcome-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-style: italic;
      color: var(--warm-gray);
      line-height: 1.6;
      margin-top: 1rem;
      margin-bottom: 2rem;
    }

    /* Der elegante Linien-Loader */
    .line-loader-container {
      width: 180px;
      height: 1px;
      background-color: rgba(201, 112, 112, 0.15); /* Transparente Basislinie */
      position: relative;
      overflow: hidden;
    }

    .line-loader-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background-color: var(--rose);
      /* Die Linie wächst in exakt 2.3 Sekunden sanft von links nach rechts */
      animation: lineGrow 2.3s forwards ease-out;
    }

    /* Animation für das sanfte Atmen des Logos */
    @keyframes logoPulse {
      0% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.02); opacity: 1; }
      100% { transform: scale(1); opacity: 0.9; }
    }

    /* Animation für die wachsende Linie */
    @keyframes lineGrow {
      0% { width: 0; }
      100% { width: 100%; }
    }

    /* Unauffälliger Fallback-Link */
    .fallback-link {
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: rgba(138, 112, 112, 0.6);
      text-decoration: none;
      margin-top: 3rem;
      transition: color 0.2s;
    }
    .fallback-link:hover {
      color: var(--rose);
    }
  </style>
</head>
<body>

  <div class="intro-container">
    <!-- Pulsierendes Studio-Logo -->
    <h1 class="brand-logo">Lumière <span>Beauty</span></h1>
    
    <p class="welcome-text">Ihr Wohlfühlort für anspruchsvolle Kosmetik</p>
    
    <!-- Die wachsende Design-Linie -->
    <div class="line-loader-container">
      <div class="line-loader-fill"></div>
    </div>
    
    <!-- Fallback -->
    <a href="kosmetik-studio.html" class="fallback-link">Wird geladen...</a>
  </div>

</body>
</html>
